<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REST Evaluation Form</title>
</head>
<body>
    <h1>Expert Evaluation Form</h1>
    <form>
        <label>Entity Complexity Rating:</label>
        <select>
            <option>Low (Rule-based is enough)</option>
            <option>Medium (Needs ML/CRF)</option>

        <button type="submit">Submit Feedback</button>
    </form>
